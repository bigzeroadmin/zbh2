name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-monorepo:
    name: Node.js (shared + server + web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

      - name: Upload server dist
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: apps/server/dist
          if-no-files-found: error

  activation-client-winui3:
    name: WinUI3 演示客户端 (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          global-json-file: global.json

      - name: Verify SDK version
        run: dotnet --version

      - name: Publish (自包含目录)
        working-directory: tools/ActivationClientWinUI3
        run: |
          dotnet restore -r win-x64
          dotnet publish -c Release -r win-x64 --self-contained true /p:Platform=x64

      - name: Zip publish output
        shell: pwsh
        run: |
          $src = Join-Path $env:GITHUB_WORKSPACE "tools/ActivationClientWinUI3/bin/Release/net8.0-windows10.0.22621.0/win-x64/publish"
          $zip = Join-Path $env:GITHUB_WORKSPACE "ActivationClientDemo-win-x64.zip"
          if (-not (Test-Path $src)) { throw "Publish output not found: $src" }
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip -CompressionLevel Optimal

      - name: Upload ActivationClientDemo (zip)
        uses: actions/upload-artifact@v4
        with:
          name: ActivationClientDemo-win-x64
          path: ActivationClientDemo-win-x64.zip
          if-no-files-found: error
