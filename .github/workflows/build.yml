name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-monorepo:
    name: Node.js (shared + server + web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error

      - name: Upload server dist
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: apps/server/dist
          if-no-files-found: error

  activation-client-winui3:
    name: WinUI3 演示客户端 (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and publish (single-file exe)
        working-directory: tools/ActivationClientWinUI3
        run: |
          dotnet restore
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true

      - name: Upload ActivationClientDemo
        uses: actions/upload-artifact@v4
        with:
          name: ActivationClientDemo-win-x64
          path: tools/ActivationClientWinUI3/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/
          if-no-files-found: warn
